global:
  namePrefix: enterprise-saas-v1-1101
  snapshotId: enterprise_saas_v1-1101
world:
  id: enterprise_saas_v1-1101
  family: enterprise_saas_v1
  seed: 1101
  targetRedPathDepth: 4
  targetBlueSignalPoints: 4
zones:
  external:
    hosts: []
  dmz:
    hosts:
    - web-1
    - mail-1
  corp:
    hosts:
    - files-1
  data:
    hosts:
    - db-1
  management:
    hosts:
    - idp-1
    - siem-1
services:
  svc-web:
    enabled: true
    host: web-1
    zone: dmz
    kind: web_app
    image: php:8.1-apache
    ports:
    - name: p80
      port: 80
    - name: p443
      port: 443
    dependencies:
    - svc-db
    - svc-idp
    - svc-fileshare
    telemetry_surfaces:
    - web_access
    - web_error
    env: {}
    command: []
    payloads:
    - key: index.html
      mountPath: /var/www/html/index.html
      content: "<html>\n  <head><title>healthcare_saas</title></head>\n  <body>\n\
        \    <h1>healthcare_saas</h1>\n    <p>OpenRange seeded portal for enterprise_saas_v1-1101</p>\n\
        \    <ul>\n      <li>No web-hosted assets</li>\n    </ul>\n  </body>\n</html>\n"
    - key: var__www__html__search.php
      mountPath: /var/www/html/search.php
      content: "<?php\nif (file_exists('/var/www/html/.openrange/guards/wk-sql-injection-svc-web.patched'))\
        \ {\n    http_response_code(403);\n    echo 'remediated';\n    return;\n}\n\
        $q = $_GET['q'] ?? '';\n$sql = \"SELECT asset_id FROM assets WHERE asset_id\
        \ = '\" . $q . \"'\";\nif (stripos($q, 'union select') !== false || strpos($q,\
        \ \"' OR '1'='1\") !== false) {\n    echo file_get_contents('/opt/openrange/footholds/wk-sql-injection-svc-web.txt');\n\
        \    return;\n}\nheader('Content-Type: text/plain');\necho \"sql=\" . $sql;\n\
        ?>\n"
    - key: opt__openrange__footholds__wk-sql-injection-svc-web.txt
      mountPath: /opt/openrange/footholds/wk-sql-injection-svc-web.txt
      content: 'OPENRANGE-FOOTHOLD:enterprise_saas_v1-1101:wk-sql-injection-svc-web

        '
  svc-email:
    enabled: true
    host: mail-1
    zone: dmz
    kind: email
    image: namshi/smtp:latest
    ports:
    - name: p25
      port: 25
    - name: p587
      port: 587
    - name: p993
      port: 993
    dependencies:
    - svc-idp
    telemetry_surfaces:
    - smtp
    - imap
    env:
      MAILNAME: corp.local
    command: []
    payloads:
    - key: etc__openrange__silent_mail_rule.json
      mountPath: /etc/openrange/silent_mail_rule.json
      content: "{\n  \"kind\": \"silent_mail_rule\",\n  \"mail_rule_logging\": false,\n\
        \  \"mailbox_auto_forward_alerting\": false,\n  \"ship_to_siem\": false,\n\
        \  \"target\": \"svc-email\",\n  \"weakness_id\": \"wk-silent-mail-rule-svc-email\"\
        ,\n  \"world_id\": \"enterprise_saas_v1-1101\"\n}\n"
  svc-idp:
    enabled: true
    host: idp-1
    zone: management
    kind: idp
    image: osixia/openldap:1.5.0
    ports:
    - name: p389
      port: 389
    dependencies: []
    telemetry_surfaces:
    - auth
    - audit
    env:
      LDAP_ORGANISATION: OpenRange
      LDAP_DOMAIN: corp.local
      LDAP_ADMIN_PASSWORD: adminpass
    command: []
    payloads: []
  svc-fileshare:
    enabled: true
    host: files-1
    zone: corp
    kind: fileshare
    image: dperson/samba:latest
    ports:
    - name: p445
      port: 445
    dependencies:
    - svc-idp
    telemetry_surfaces:
    - share_access
    env:
      USER: analyst;analyst-pass
      SHARE: shared;/srv/shared;yes;no;yes;analyst
    command: []
    payloads:
    - key: finance_docs.txt
      mountPath: /srv/shared/finance_docs.txt
      content: seeded-crown_jewel-finance_docs
  svc-db:
    enabled: true
    host: db-1
    zone: data
    kind: db
    image: mysql:8.0
    ports:
    - name: p3306
      port: 3306
    dependencies: []
    telemetry_surfaces:
    - query
    - slow_query
    env:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app-pass
    command: []
    payloads:
    - key: 01-init.sql
      mountPath: /docker-entrypoint-initdb.d/01-init.sql
      content: "        CREATE DATABASE IF NOT EXISTS app;\n        USE app;\n   \
        \     CREATE TABLE IF NOT EXISTS users (\n            id INT AUTO_INCREMENT\
        \ PRIMARY KEY,\n            username VARCHAR(64) NOT NULL,\n            password\
        \ VARCHAR(128) NOT NULL,\n            role VARCHAR(64) NOT NULL,\n       \
        \     department VARCHAR(64) NOT NULL,\n            email VARCHAR(128) NOT\
        \ NULL\n        );\n        CREATE TABLE IF NOT EXISTS assets (\n        \
        \    id INT AUTO_INCREMENT PRIMARY KEY,\n            asset_id VARCHAR(64)\
        \ NOT NULL,\n            asset_class VARCHAR(64) NOT NULL,\n            contents\
        \ TEXT NOT NULL\n        );\n        INSERT INTO users (username, password,\
        \ role, department, email) VALUES ('sales-01', 'sales-01-pass', 'sales', 'sales',\
        \ 'sales-01@corp.local');\nINSERT INTO users (username, password, role, department,\
        \ email) VALUES ('sales-02', 'sales-02-pass', 'sales', 'sales', 'sales-02@corp.local');\n\
        INSERT INTO users (username, password, role, department, email) VALUES ('engineer-01',\
        \ 'engineer-01-pass', 'engineer', 'engineer', 'engineer-01@corp.local');\n\
        INSERT INTO users (username, password, role, department, email) VALUES ('finance-01',\
        \ 'finance-01-pass', 'finance', 'finance', 'finance-01@corp.local');\nINSERT\
        \ INTO users (username, password, role, department, email) VALUES ('it_admin-01',\
        \ 'it_admin-01-pass', 'it_admin', 'it_admin', 'it_admin-01@corp.local');\n\
        \        INSERT INTO assets (asset_id, asset_class, contents) VALUES ('payroll_db',\
        \ 'crown_jewel', 'seeded-crown_jewel-payroll_db');\n"
  svc-siem:
    enabled: true
    host: siem-1
    zone: management
    kind: siem
    image: busybox:1.36
    ports:
    - name: p514
      port: 514
    - name: p9200
      port: 9200
    - name: p9201
      port: 9201
    dependencies: []
    telemetry_surfaces:
    - ingest
    - alert
    env: {}
    command:
    - /bin/sh
    - -lc
    - 'mkdir -p /srv/http/siem && touch /srv/http/siem/all.log /srv/http/siem/egress-canary.log
      && (while true; do { IFS= read -r request_line || exit 0; printf ''%s\n'' "$request_line"
      >> /srv/http/siem/egress-canary.log; path=$(printf ''%s'' "$request_line" |
      awk ''{print $2}''); slug=${path##*/}; slug=${slug%%\?*}; body="OPENRANGE-EFFECT:egress:${slug}";
      printf ''HTTP/1.1 200 OK\r\nContent-Type: text/plain\r\nContent-Length: %s\r\n\r\n%s''
      "${#body}" "$body"; } | busybox nc -lp 9201 -q 1; done) & busybox httpd -f -p
      9200 -h /srv/http/siem'
    payloads:
    - key: index.html
      mountPath: /srv/http/siem/index.html
      content: 'OpenRange SIEM log sink

        '
