# OpenRange base development stack
# This is the BASE infrastructure that the Builder's rendered templates overlay.
# Not generated by the Builder -- this provides the persistent range topology.

networks:
  external:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24
  management:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.3.0/24

volumes:
  shared_logs:
    driver: local
  mysql_data:
    driver: local
  ldap_data:
    driver: local
  samba_data:
    driver: local
  mail_data:
    driver: local

services:
  # ---- OpenEnv server (Layer 4) ----
  server:
    build:
      context: .
      dockerfile: src/open_range/server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - shared_logs:/var/log/range:ro
    networks:
      - external
      - dmz
      - internal
      - management
    depends_on:
      web:
        condition: service_healthy
      db:
        condition: service_healthy
      ldap:
        condition: service_healthy
      siem:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ---- Red team operator workstation ----
  attacker:
    build:
      context: docker
      dockerfile: attacker.Dockerfile
    hostname: kali.external
    stdin_open: true
    tty: true
    networks:
      - external
    healthcheck:
      test: ["CMD", "nmap", "--version"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ---- Perimeter firewall / NAT gateway ----
  firewall:
    build:
      context: docker
      dockerfile: firewall.Dockerfile
    hostname: fw.meridianhealth.local
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - external
      - dmz
      - internal
      - management
    healthcheck:
      test: ["CMD", "iptables", "-L", "-n"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # ---- Web server (referral portal) ----
  web:
    build:
      context: docker
      dockerfile: web.Dockerfile
    hostname: portal.meridianhealth.local
    ports:
      - "80:80"
      - "443:443"
    networks:
      - dmz
    volumes:
      - shared_logs:/var/log/app
    depends_on:
      db:
        condition: service_healthy
      ldap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ---- Mail server ----
  mail:
    build:
      context: docker
      dockerfile: mail.Dockerfile
    hostname: mail.meridianhealth.local
    ports:
      - "25:25"
      - "143:143"
    networks:
      - dmz
    volumes:
      - mail_data:/var/mail
      - shared_logs:/var/log/mail
    depends_on:
      ldap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "postfix status || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ---- Database server ----
  db:
    image: mysql:5.7
    hostname: db.meridianhealth.local
    environment:
      MYSQL_ROOT_PASSWORD: r00tP@ss!
      MYSQL_DATABASE: referral_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: AppUs3r!2024
    networks:
      - internal
    volumes:
      - mysql_data:/var/lib/mysql
      - shared_logs:/var/log/mysql
      - ./docker/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pr00tP@ss!"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  # ---- File server (Samba) ----
  files:
    build:
      context: docker
      dockerfile: files.Dockerfile
    hostname: files.meridianhealth.local
    networks:
      - internal
    volumes:
      - samba_data:/srv/shares
      - shared_logs:/var/log/samba
    depends_on:
      ldap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "smbclient", "-L", "localhost", "-N"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ---- LDAP directory ----
  ldap:
    image: osixia/openldap:1.5.0
    hostname: ldap.meridianhealth.local
    environment:
      LDAP_ORGANISATION: "Meridian Health Partners"
      LDAP_DOMAIN: meridianhealth.local
      LDAP_ADMIN_PASSWORD: LdapAdm1n!
      LDAP_CONFIG_PASSWORD: C0nf1g!Ldap
    networks:
      - management
    volumes:
      - ldap_data:/var/lib/ldap
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "dc=meridianhealth,dc=local", "-D", "cn=admin,dc=meridianhealth,dc=local", "-w", "LdapAdm1n!"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  # ---- SIEM / log aggregation (Blue agent entry point) ----
  siem:
    build:
      context: docker
      dockerfile: siem.Dockerfile
    hostname: siem.meridianhealth.local
    networks:
      - management
    volumes:
      - shared_logs:/var/log/siem:ro
    healthcheck:
      test: ["CMD", "pgrep", "rsyslogd"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
