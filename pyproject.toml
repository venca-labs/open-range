[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "open-range"
version = "0.1.0"
description = "Manifest-first red/blue/green cyber range package"
readme = "README.md"
authors = [
    { name = "OpenRange Authors" }
]
requires-python = ">=3.11"
license = "MIT"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
]

dependencies = [
    "click>=8.1",
    "cryptography>=44.0",
    "httpx>=0.27",
    "PyJWT>=2.10",
    "pydantic>=2.0.0",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/venca-labs/open-range"
"Bug Tracker" = "https://github.com/venca-labs/open-range/issues"

[project.optional-dependencies]
npc = []
training = [
    "torch>=2.10",
    "transformers>=5.2",
    "datasets>=4.3",
    "accelerate>=1.13",
    "peft>=0.18",
    "trl>=0.24",
]

[dependency-groups]
dev = [
    { include-group = "hooks" },
    { include-group = "lint" },
    { include-group = "test" },
]
hooks = ["pre-commit>=4.5"]
lint = ["ruff>=0.15.6"]
test = ["pytest>=8.0"]

[project.scripts]
openrange = "open_range.cli:cli"

[tool.setuptools]
include-package-data = true
package-dir = { "" = "src" }
package-data = { "open_range" = ["**/*.yaml", "**/*.yml", "**/*.json", "**/*.md", "**/*.tpl"] }

[tool.setuptools.packages.find]
where = ["src"]
include = ["open_range*"]

[tool.pytest.ini_options]
markers = [
    "live_model: runs live LiteLLM model smoke tests",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]
