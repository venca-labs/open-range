name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.11"
          python-version: "3.11"
          enable-cache: true

      - name: Install lint dependencies
        run: uv sync --locked --no-default-groups --group lint

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run lint
        run: uv run ruff check .

      - name: Validate manifests
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import yaml

          for path in sorted(Path("src/open_range/_resources/manifests").glob("*.yaml")):
              with path.open("r", encoding="utf-8") as handle:
                  yaml.safe_load(handle)
          PY

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.11"
          python-version: "3.11"
          enable-cache: true

      - name: Install test dependencies
        run: uv sync --locked --no-default-groups --group test

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Verify Dockerfiles parse correctly
        run: docker buildx build --check -f Dockerfile .

  cli-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.11"
          python-version: "3.11"
          enable-cache: true

      - name: Install package dependencies
        run: uv sync

      - name: Offline CLI admission E2E check
        run: |
          tmpdir=$(mktemp -d /tmp/openrange-ci-XXXXXX)
          uv run -m open_range.cli build \
            -m src/open_range/_resources/manifests/tier1_basic.yaml \
            -o "$tmpdir/build" \
            --security-tier 3 \
            --cluster-backend k3d \
            --network-policy-backend cilium

          uv run -m open_range.cli admit \
            -m src/open_range/_resources/manifests/tier1_basic.yaml \
            -o "$tmpdir/admit" \
            --store-dir "$tmpdir/store" \
            --validation-profile graph_only \
            --security-tier 3 \
            --cluster-backend k3d \
            --network-policy-backend cilium
