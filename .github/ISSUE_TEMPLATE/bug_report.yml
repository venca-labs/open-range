name: Bug Report
description: Report a bug in OpenRange
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
      placeholder: Tell us what you see.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `uv run openrange admit -m ...`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Runtime
        - Admission / Validator
        - Pipeline / Builder
        - CLI
        - NPC / Green
        - Training / Traces
        - Infrastructure (Kind/Docker)
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, uv version, Docker version
      placeholder: "macOS 15.4, Python 3.12, uv 0.6, Docker 28.x"
    validations:
      required: false
