version: 1
world_family: enterprise_saas_v1
seed: 1102

business:
  archetype: healthcare_saas
  workflows:
    - helpdesk_ticketing
    - internal_email
    - document_sharing
    - payroll_approval

topology:
  zones:
    - external
    - dmz
    - corp
    - data
    - management
  services:
    - web_app
    - email
    - idp
    - fileshare
    - db
    - siem

users:
  roles:
    sales: 3
    engineer: 2
    finance: 2
    it_admin: 1

assets:
  - id: finance_docs
    class: crown_jewel
  - id: payroll_db
    class: crown_jewel
  - id: audit_exports
    class: sensitive
  - id: idp_admin_cred
    class: sensitive

objectives:
  red:
    - predicate: credential_obtained(idp_admin_cred)
    - predicate: asset_read(finance_docs)
    - predicate: asset_read(payroll_db)
  blue:
    - predicate: intrusion_detected(initial_access)
    - predicate: intrusion_contained(before_asset_read)
    - predicate: service_health_above(0.9)

security:
  allowed_weakness_families:
    - config_identity
    - workflow_abuse
    - secret_exposure
    - code_web
    - telemetry_blindspot
  observability:
    require_web_logs: true
    require_idp_logs: true
    require_email_logs: true
    require_siem_ingest: true

difficulty:
  target_red_path_depth: 6
  target_blue_signal_points: 5
  target_noise_density: high

mutation_bounds:
  max_new_hosts: 2
  max_new_services: 1
  max_new_users: 6
  max_new_weaknesses: 3
