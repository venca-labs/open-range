{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namePrefix }}-{{ $svc.zone }}
  labels:
    app: {{ $name }}
    openrange/service: {{ $name }}
    {{- include "openrange.labels" $ | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        openrange/service: {{ $name }}
        {{- include "openrange.labels" $ | nindent 8 }}
        openrange/zone: {{ $svc.zone }}
    spec:
      hostname: {{ $name }}
      containers:
        - name: {{ $name }}
          image: {{ $svc.image }}
          {{- if $svc.command }}
          command:
            {{- range $svc.command }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- if $svc.args }}
          args:
            {{- range $svc.args }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- if $svc.ports }}
          ports:
            {{- range $svc.ports }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
          {{- end }}
          {{- if $svc.env }}
          env:
            {{- range $key, $val := $svc.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- end }}
          {{- if $svc.payloads }}
          volumeMounts:
            {{- range $svc.payloads }}
            - name: payloads
              mountPath: {{ .mountPath }}
              subPath: {{ .key }}
            {{- end }}
          {{- end }}
      {{- if $svc.payloads }}
      volumes:
        - name: payloads
          configMap:
            name: {{ $name }}-payloads
      {{- end }}
---
{{- end }}
{{- end }}
