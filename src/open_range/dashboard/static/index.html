<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenRange — Cyber Range Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
:root {
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e17; }
#canvas { width: 100%; height: 100%; display: block; }

/* ── HUD Overlay ────────────────────────────────────────── */
.hud { position: fixed; pointer-events: none; font-family: var(--font-sans); z-index: 10; }

/* Top bar */
.hud-top {
  top: 0; left: 0; right: 0; height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  background: linear-gradient(180deg, rgba(10,14,23,0.95) 0%, rgba(10,14,23,0.4) 100%);
}
.hud-title {
  font-size: 16px; font-weight: 600; color: #e2e8f0;
  text-shadow: 0 0 20px rgba(56,189,248,0.3);
}
.hud-status {
  font-size: 12px; font-weight: 500; padding: 4px 14px;
  border-radius: 20px; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.hud-status.idle { background: rgba(100,116,139,0.3); color: #94a3b8; }
.hud-status.running { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
.hud-status.done { background: rgba(56,189,248,0.15); color: #38bdf8; }

.hud-controls {
  display: flex; gap: 6px; pointer-events: all;
}
.hud-btn {
  padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
  border: 1px solid rgba(100,116,139,0.3); background: rgba(15,23,42,0.8);
  color: #e2e8f0; cursor: pointer; font-family: var(--font-sans);
  backdrop-filter: blur(10px); transition: 0.2s;
}
.hud-btn:hover { border-color: #38bdf8; background: rgba(56,189,248,0.1); }
.hud-btn.play { border-color: rgba(74,222,128,0.4); }
.hud-btn.play:hover { background: rgba(74,222,128,0.15); }

/* Score panel — Sims-style need bars */
.hud-scores {
  top: 60px; right: 16px; width: 220px;
  background: rgba(15,23,42,0.85); border: 1px solid rgba(100,116,139,0.2);
  border-radius: 12px; padding: 14px; backdrop-filter: blur(20px);
}
.score-title { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
.need-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.need-label { font-size: 11px; font-weight: 500; width: 65px; }
.need-bar-bg { flex: 1; height: 10px; border-radius: 5px; background: rgba(30,41,59,0.8); overflow: hidden; }
.need-bar { height: 100%; border-radius: 5px; transition: width 0.8s ease; }
.need-bar.red { background: linear-gradient(90deg, #f43f5e, #fb7185); }
.need-bar.blue { background: linear-gradient(90deg, #38bdf8, #7dd3fc); }
.need-bar.green { background: linear-gradient(90deg, #4ade80, #86efac); }
.score-meta { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(100,116,139,0.15); }
.meta-row { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-bottom: 3px; }
.meta-val { font-weight: 600; color: #e2e8f0; font-family: var(--font-mono); }

/* Narrator — speech bubble */
.hud-narrator {
  bottom: 16px; left: 50%; transform: translateX(-50%);
  max-width: 600px; width: 90%;
  background: rgba(15,23,42,0.9); border: 1px solid rgba(100,116,139,0.25);
  border-radius: 16px; padding: 14px 20px;
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.narrator-label { font-size: 10px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.narrator-text {
  font-size: 14px; line-height: 1.5; color: #cbd5e1; font-style: italic;
  transition: 0.3s;
}
.narrator-text.active { color: #f1f5f9; }

/* Event feed — bottom left */
.hud-feed {
  bottom: 16px; left: 16px; width: 280px; max-height: 200px;
  overflow-y: auto; display: flex; flex-direction: column-reverse;
}
.feed-item {
  font-size: 11px; padding: 4px 0; color: #94a3b8;
  border-bottom: 1px solid rgba(100,116,139,0.08);
  animation: feedSlide 0.3s ease;
}
.feed-item .feed-time { font-family: var(--font-mono); color: #64748b; margin-right: 6px; }
.feed-item .feed-actor { font-weight: 600; }
.feed-item .feed-actor.red { color: #f43f5e; }
.feed-item .feed-actor.blue { color: #38bdf8; }
.feed-item .feed-actor.green { color: #4ade80; }

/* Sim clock */
.hud-clock {
  top: 60px; left: 16px;
  background: rgba(15,23,42,0.85); border: 1px solid rgba(100,116,139,0.2);
  border-radius: 12px; padding: 10px 16px; backdrop-filter: blur(20px);
}
.clock-time { font-family: var(--font-mono); font-size: 20px; font-weight: 600; color: #e2e8f0; }
.clock-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

@keyframes feedSlide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD: Top Bar -->
<div class="hud hud-top">
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="hud-title">🏢 OpenRange</span>
    <span id="status" class="hud-status idle">IDLE</span>
  </div>
  <div class="hud-controls">
    <button class="hud-btn" onclick="resetEpisode()">⟳ Reset</button>
    <button class="hud-btn play" onclick="playEpisode()">▶ Play</button>
    <button class="hud-btn" onclick="pauseEpisode()">⏸ Pause</button>
  </div>
</div>

<!-- HUD: Clock -->
<div class="hud hud-clock">
  <div class="clock-label">Sim Time</div>
  <div id="sim-clock" class="clock-time">00:00</div>
</div>

<!-- HUD: Scores (Sims need bars) -->
<div class="hud hud-scores">
  <div class="score-title">Simulation Status</div>
  <div class="need-row">
    <span class="need-label" style="color:#f43f5e;">🔴 Red</span>
    <div class="need-bar-bg"><div id="bar-red" class="need-bar red" style="width:0%"></div></div>
  </div>
  <div class="need-row">
    <span class="need-label" style="color:#38bdf8;">🔵 Blue</span>
    <div class="need-bar-bg"><div id="bar-blue" class="need-bar blue" style="width:0%"></div></div>
  </div>
  <div class="need-row">
    <span class="need-label" style="color:#4ade80;">💚 Uptime</span>
    <div class="need-bar-bg"><div id="bar-cont" class="need-bar green" style="width:100%"></div></div>
  </div>
  <div class="score-meta">
    <div class="meta-row"><span>Winner</span><span id="m-winner" class="meta-val">—</span></div>
    <div class="meta-row"><span>Decisions</span><span id="m-decisions" class="meta-val">0</span></div>
    <div class="meta-row"><span>Red Obj</span><span id="m-robj" class="meta-val">0</span></div>
    <div class="meta-row"><span>Blue Obj</span><span id="m-bobj" class="meta-val">0</span></div>
  </div>
</div>

<!-- HUD: Event Feed -->
<div class="hud hud-feed" id="feed"></div>

<!-- HUD: Narrator -->
<div class="hud hud-narrator">
  <div class="narrator-label">💬 Narrator — powered by NIM</div>
  <div id="narrator" class="narrator-text">The office is quiet. Reset an episode to begin the simulation...</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   THREE.JS — ISOMETRIC OFFICE WORLD
   ═══════════════════════════════════════════════════════════════ */

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1f2e);
scene.fog = new THREE.FogExp2(0x1a1f2e, 0.012);

/* ── Camera (isometric like The Sims) ──────────────────────── */
const aspect = window.innerWidth / window.innerHeight;
const frustum = 22;
const camera = new THREE.OrthographicCamera(
  -frustum * aspect, frustum * aspect,
  frustum, -frustum, 0.1, 200
);
camera.position.set(30, 30, 30);
camera.lookAt(0, 0, 0);

const controls = new THREE.OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 3;
controls.minPolarAngle = Math.PI / 6;
controls.enablePan = true;
controls.screenSpacePanning = false;

/* ── Lighting ──────────────────────────────────────────────── */
const ambient = new THREE.AmbientLight(0x405070, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffeedd, 0.9);
sun.position.set(20, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -30; sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -30;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
fill.position.set(-15, 10, -10);
scene.add(fill);

/* ── Materials ─────────────────────────────────────────────── */
const mats = {
  floor: new THREE.MeshStandardMaterial({ color: 0x2a3040, roughness: 0.8 }),
  wall: new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.6, transparent: true, opacity: 0.5 }),
  desk: new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.7 }),
  monitor: new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.3, metalness: 0.5 }),
  screen: new THREE.MeshStandardMaterial({ color: 0x38bdf8, emissive: 0x38bdf8, emissiveIntensity: 0.4 }),
  server: new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.4, metalness: 0.6 }),
  serverLight: new THREE.MeshStandardMaterial({ color: 0x4ade80, emissive: 0x4ade80, emissiveIntensity: 0.6 }),
  grass: new THREE.MeshStandardMaterial({ color: 0x1a2e1a, roughness: 0.9 }),
  path: new THREE.MeshStandardMaterial({ color: 0x3a3a4a, roughness: 0.7 }),
  red: new THREE.MeshStandardMaterial({ color: 0xf43f5e, emissive: 0xf43f5e, emissiveIntensity: 0.3 }),
  blue: new THREE.MeshStandardMaterial({ color: 0x38bdf8, emissive: 0x38bdf8, emissiveIntensity: 0.3 }),
  green: new THREE.MeshStandardMaterial({ color: 0x4ade80, emissive: 0x4ade80, emissiveIntensity: 0.3 }),
  skin: new THREE.MeshStandardMaterial({ color: 0xf0c8a0, roughness: 0.8 }),
};

/* ── Ground ────────────────────────────────────────────────── */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  mats.grass
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Grid overlay
const gridHelper = new THREE.GridHelper(80, 40, 0x2a3a4a, 0x1a2a3a);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

/* ── Room/Zone Builder ─────────────────────────────────────── */
const zonePositions = {};
const servicePositions = {};
const roomGroups = {};

function buildRoom(id, x, z, w, d, label, color) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);

  // Floor
  const floor = new THREE.Mesh(new THREE.BoxGeometry(w, 0.15, d), mats.floor);
  floor.position.y = 0.075;
  floor.receiveShadow = true;
  group.add(floor);

  // Walls (transparent)
  const wallMat = new THREE.MeshStandardMaterial({
    color: color || 0x334155, roughness: 0.6,
    transparent: true, opacity: 0.25
  });
  const wallH = 3;
  // Back wall
  const bw = new THREE.Mesh(new THREE.BoxGeometry(w, wallH, 0.12), wallMat);
  bw.position.set(0, wallH/2 + 0.15, -d/2);
  group.add(bw);
  // Left wall
  const lw = new THREE.Mesh(new THREE.BoxGeometry(0.12, wallH, d), wallMat);
  lw.position.set(-w/2, wallH/2 + 0.15, 0);
  group.add(lw);

  // Label
  const labelSprite = makeTextSprite(label, { fontSize: 28, color: '#94a3b8' });
  labelSprite.position.set(0, wallH + 0.5, 0);
  group.add(labelSprite);

  // Ceiling glow line
  const glowGeo = new THREE.BoxGeometry(w - 0.5, 0.08, 0.08);
  const glowMat = new THREE.MeshStandardMaterial({ color: color || 0x38bdf8, emissive: color || 0x38bdf8, emissiveIntensity: 0.5 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.set(0, wallH + 0.15, -d/2 + 0.2);
  group.add(glow);

  scene.add(group);
  roomGroups[id] = group;
  zonePositions[id] = { x, z, w, d };
  return group;
}

function addDesk(room, lx, lz) {
  const desk = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.7, 0.8), mats.desk);
  desk.position.set(lx, 0.5, lz);
  desk.castShadow = true;
  room.add(desk);
  // Monitor
  const mon = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.05), mats.monitor);
  mon.position.set(lx, 1.2, lz - 0.25);
  room.add(mon);
  const scr = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.48, 0.02), mats.screen);
  scr.position.set(lx, 1.2, lz - 0.27);
  room.add(scr);
  // Chair
  const chair = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.4, 8), mats.desk);
  chair.position.set(lx, 0.35, lz + 0.7);
  room.add(chair);
  return { x: lx, z: lz };
}

function addServerRack(room, lx, lz) {
  for (let i = 0; i < 3; i++) {
    const rack = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.5), mats.server);
    rack.position.set(lx + i * 0.8, 1.05, lz);
    rack.castShadow = true;
    room.add(rack);
    // Blinky lights
    for (let j = 0; j < 4; j++) {
      const light = new THREE.Mesh(
        new THREE.BoxGeometry(0.04, 0.04, 0.01),
        mats.serverLight
      );
      light.position.set(lx + i * 0.8 - 0.15 + j * 0.1, 1.2 + j * 0.15, lz - 0.26);
      room.add(light);
    }
  }
}

/* ── Build Office Layout ───────────────────────────────────── */
// DMZ / External
const dmzRoom = buildRoom('dmz', -12, -8, 8, 6, '🌐 DMZ', 0xf59e0b);
const webDesk = addDesk(dmzRoom, -1.5, 0);
const webDesk2 = addDesk(dmzRoom, 1.5, 0);
servicePositions['svc-web'] = { x: -12 + webDesk.x, z: -8 + webDesk.z };
servicePositions['svc-mail'] = { x: -12 + webDesk2.x, z: -8 + webDesk2.z };

// Corp Office
const corpRoom = buildRoom('corp', 2, -8, 10, 6, '🏢 Corp Office', 0x3b82f6);
addDesk(corpRoom, -3, 0);
addDesk(corpRoom, -1, 0);
addDesk(corpRoom, 1, 0);
addDesk(corpRoom, 3, 0);
servicePositions['svc-idp'] = { x: 2 - 3, z: -8 };
servicePositions['svc-fileshare'] = { x: 2 + 3, z: -8 };

// Server Room / Internal
const srvRoom = buildRoom('internal', -5, 2, 8, 6, '🗄️ Server Room', 0x8b5cf6);
addServerRack(srvRoom, -2, 0);
addServerRack(srvRoom, 1.5, 0);
servicePositions['svc-db'] = { x: -5 - 2, z: 2 };

// SOC / Management
const socRoom = buildRoom('management', 8, 2, 8, 6, '🛡️ SOC', 0x10b981);
addDesk(socRoom, -2, 0);
addDesk(socRoom, 0, 0);
addDesk(socRoom, 2, 0);
servicePositions['svc-siem'] = { x: 8, z: 2 };
servicePositions['svc-firewall'] = { x: 8 + 2, z: 2 };

/* ── Sims-style Character Builder ──────────────────────────── */
const characters = {};

function createCharacter(id, role, startPos) {
  const group = new THREE.Group();
  const roleColor = role === 'red' ? mats.red : role === 'blue' ? mats.blue : mats.green;
  const bodyColor = role === 'red' ? 0x991b1b : role === 'blue' ? 0x1e3a5f : 0x166534;

  // Body (capsule shape)
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.25, 0.2, 0.9, 8),
    new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.6 })
  );
  body.position.y = 0.75;
  body.castShadow = true;
  group.add(body);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 8),
    mats.skin
  );
  head.position.y = 1.45;
  head.castShadow = true;
  group.add(head);

  // Arms
  for (const side of [-1, 1]) {
    const arm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.06, 0.5, 6),
      new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.6 })
    );
    arm.position.set(side * 0.32, 0.9, 0);
    arm.rotation.z = side * 0.15;
    group.add(arm);
  }

  // PLUMBOB (The Sims diamond!)
  const plumbobGeo = new THREE.OctahedronGeometry(0.15, 0);
  const plumbob = new THREE.Mesh(plumbobGeo, roleColor.clone());
  plumbob.position.y = 2.0;
  plumbob.userData.isPlumbob = true;
  group.add(plumbob);

  // Point light under plumbob
  const plight = new THREE.PointLight(roleColor.color || 0xffffff, 0.5, 3);
  plight.position.y = 1.8;
  group.add(plight);

  // Name label
  const label = makeTextSprite(id, { fontSize: 22, color: role === 'red' ? '#f43f5e' : role === 'blue' ? '#38bdf8' : '#4ade80' });
  label.position.y = 2.4;
  group.add(label);

  group.position.set(startPos.x, 0.15, startPos.z);
  scene.add(group);

  characters[id] = {
    group, role, target: null,
    pos: { x: startPos.x, z: startPos.z },
    plumbob, plight,
    walkPhase: Math.random() * Math.PI * 2,
    idleTimer: 0,
  };
  return characters[id];
}

/* ── Text Sprite Helper ────────────────────────────────────── */
function makeTextSprite(text, opts = {}) {
  const canvas2d = document.createElement('canvas');
  const ctx = canvas2d.getContext('2d');
  const fontSize = opts.fontSize || 24;
  canvas2d.width = 256;
  canvas2d.height = 64;
  ctx.font = `${fontSize}px Inter, sans-serif`;
  ctx.fillStyle = opts.color || '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);

  const tex = new THREE.CanvasTexture(canvas2d);
  tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3, 0.75, 1);
  return sprite;
}

/* ── Particle System for Events ────────────────────────────── */
const particles = [];

function spawnParticles(worldPos, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.06, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(worldPos);
    mesh.position.y += 1;
    scene.add(mesh);
    particles.push({
      mesh,
      vel: new THREE.Vector3(
        (Math.random() - 0.5) * 0.15,
        Math.random() * 0.12 + 0.05,
        (Math.random() - 0.5) * 0.15
      ),
      life: 1.0,
      decay: 0.015 + Math.random() * 0.01,
    });
  }
}

/* ── Attack Beam Effect ────────────────────────────────────── */
const beams = [];

function spawnBeam(from, to, color) {
  const pts = [
    new THREE.Vector3(from.x, 1.5, from.z),
    new THREE.Vector3(to.x, 1.5, to.z),
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.8, linewidth: 2 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  beams.push({ line, life: 1.0 });
}

/* ═══════════════════════════════════════════════════════════════
   GAME LOGIC
   ═══════════════════════════════════════════════════════════════ */

let topology = null;
let eventSource = null;
let narrateSource = null;
let events = [];
let npcsSpawned = false;

/* ── API ───────────────────────────────────────────────────── */
async function api(method, path) {
  const resp = await fetch(path, { method });
  return resp.json();
}

/* ── Spawn dynamic characters from topology ────────────────── */
function spawnFromTopology(topo) {
  if (npcsSpawned) return;
  npcsSpawned = true;

  // Green NPCs from world users
  const defaultPositions = [
    { x: 2 - 3, z: -8 + 1.5 },
    { x: 2 - 1, z: -8 + 1.5 },
    { x: 2 + 1, z: -8 + 1.5 },
    { x: 2 + 3, z: -8 + 1.5 },
  ];
  (topo.users || []).forEach((u, i) => {
    const pos = defaultPositions[i % defaultPositions.length];
    createCharacter(u.id, 'green', { x: pos.x + (i > 3 ? 1 : 0), z: pos.z });
  });

  // If no users in topology, spawn some defaults
  if (!topo.users || topo.users.length === 0) {
    createCharacter('sarah_sales', 'green', { x: -1, z: -6.5 });
    createCharacter('mike_eng', 'green', { x: 1, z: -6.5 });
    createCharacter('admin_it', 'green', { x: 3, z: -6.5 });
  }

  // Red attacker (starts outside)
  createCharacter('agent-red', 'red', { x: -18, z: -12 });

  // Blue defender (starts in SOC)
  createCharacter('agent-blue', 'blue', { x: 8, z: 2.5 });
}

/* ── Move characters toward targets ────────────────────────── */
function moveCharacterTo(charId, targetServiceId) {
  const ch = characters[charId];
  if (!ch) return;
  const pos = servicePositions[targetServiceId];
  if (!pos) return;
  ch.target = { x: pos.x, z: pos.z + 1.2 }; // stand in front of desk
}

/* ── Process runtime event ─────────────────────────────────── */
function onRuntimeEvent(ev) {
  events.unshift(ev);
  if (events.length > 100) events.pop();

  // Update clock
  const t = ev.time || 0;
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  document.getElementById('sim-clock').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  // Move the acting character
  const actorId = ev.actor === 'red' ? 'agent-red' : ev.actor === 'blue' ? 'agent-blue' : ev.source_entity;
  if (ev.target_entity && servicePositions[ev.target_entity]) {
    moveCharacterTo(actorId, ev.target_entity);
  }

  // Spawn particles at target
  const tgtPos = servicePositions[ev.target_entity];
  if (tgtPos) {
    const color = ev.actor === 'red' ? 0xf43f5e : ev.actor === 'blue' ? 0x38bdf8 : 0x4ade80;
    spawnParticles(new THREE.Vector3(tgtPos.x, 0, tgtPos.z), color, ev.malicious ? 20 : 8);

    // Attack beams for malicious events
    if (ev.malicious) {
      const srcPos = servicePositions[ev.source_entity] || { x: -18, z: -12 };
      spawnBeam(srcPos, tgtPos, 0xf43f5e);
    }
  }

  // Feed
  addFeedItem(ev);

  // Poll state occasionally
  if (events.length % 3 === 0) pollState();
  if (ev.id === 'episode-done') setStatus('done');
}

function addFeedItem(ev) {
  const feed = document.getElementById('feed');
  const el = document.createElement('div');
  el.className = 'feed-item';
  const emoji = ev.actor === 'red' ? '🔴' : ev.actor === 'blue' ? '🔵' : '🟢';
  el.innerHTML = `<span class="feed-time">t=${(ev.time||0).toFixed(1)}</span>
    <span class="feed-actor ${ev.actor}">${emoji} ${ev.actor}</span>
    ${ev.event_type} → ${ev.target_entity}`;
  feed.prepend(el);
  if (feed.children.length > 30) feed.lastChild.remove();
}

async function pollState() {
  try {
    const s = await api('GET', '/api/state');
    if (!s.error) {
      document.getElementById('bar-red').style.width = `${Math.min(100, Math.abs(s.red_reward||0)*100)}%`;
      document.getElementById('bar-blue').style.width = `${Math.min(100, Math.abs(s.blue_reward||0)*100)}%`;
      document.getElementById('bar-cont').style.width = `${(s.continuity ?? 1) * 100}%`;
      document.getElementById('m-winner').textContent = s.winner || '—';
      document.getElementById('m-decisions').textContent = s.decision_count || 0;
      document.getElementById('m-robj').textContent = (s.red_objectives_satisfied||[]).length;
      document.getElementById('m-bobj').textContent = (s.blue_objectives_satisfied||[]).length;
    }
  } catch(e) {}
}

/* ── Episode Controls ──────────────────────────────────────── */
async function resetEpisode() {
  stopStreams();
  setStatus('idle');
  const result = await api('POST', '/api/episode/reset');
  if (result.topology) {
    topology = result.topology;
    spawnFromTopology(topology);
  }
  events = [];
  document.getElementById('feed').innerHTML = '';
  document.getElementById('narrator').textContent =
    `Episode loaded on ${result.snapshot_id || 'unknown'}. Press Play to watch the simulation unfold...`;
}

async function playEpisode() {
  setStatus('running');
  await api('POST', '/api/episode/play');
  startEventStream();
  startNarrateStream();
}

async function pauseEpisode() {
  setStatus('idle');
  await api('POST', '/api/episode/pause');
  stopStreams();
}

function setStatus(s) {
  const el = document.getElementById('status');
  el.className = 'hud-status';
  if (s === 'running') { el.classList.add('running'); el.textContent = 'SIMULATING'; }
  else if (s === 'done') { el.classList.add('done'); el.textContent = 'COMPLETE'; }
  else { el.classList.add('idle'); el.textContent = 'IDLE'; }
}

function startEventStream() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/api/events/stream');
  eventSource.addEventListener('runtime_event', e => onRuntimeEvent(JSON.parse(e.data)));
}

function startNarrateStream() {
  if (narrateSource) narrateSource.close();
  narrateSource = new EventSource('/api/narrate/stream');
  narrateSource.addEventListener('narration', e => {
    const data = JSON.parse(e.data);
    const el = document.getElementById('narrator');
    el.textContent = data.text;
    el.classList.add('active');
  });
}

function stopStreams() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  if (narrateSource) { narrateSource.close(); narrateSource = null; }
}

/* ═══════════════════════════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════════════════════════ */

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // ── Animate Characters ──
  for (const [id, ch] of Object.entries(characters)) {
    // Plumbob rotation + bob
    if (ch.plumbob) {
      ch.plumbob.rotation.y += dt * 2.0;
      ch.plumbob.position.y = 2.0 + Math.sin(t * 2 + ch.walkPhase) * 0.1;
    }

    // Walk toward target
    if (ch.target) {
      const dx = ch.target.x - ch.pos.x;
      const dz = ch.target.z - ch.pos.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      if (dist > 0.3) {
        const speed = 3.5;
        ch.pos.x += (dx / dist) * speed * dt;
        ch.pos.z += (dz / dist) * speed * dt;
        ch.group.position.x = ch.pos.x;
        ch.group.position.z = ch.pos.z;
        // Face direction
        ch.group.rotation.y = Math.atan2(dx, dz);
        // Walk bob
        ch.walkPhase += dt * 10;
        ch.group.position.y = 0.15 + Math.abs(Math.sin(ch.walkPhase)) * 0.08;
      } else {
        ch.target = null;
        ch.group.position.y = 0.15;
      }
    } else {
      // Idle sway
      ch.idleTimer += dt;
      if (ch.role === 'green' && ch.idleTimer > 5 + Math.random() * 5) {
        ch.idleTimer = 0;
        // Random wander within corp
        const zone = zonePositions['corp'];
        if (zone) {
          ch.target = {
            x: zone.x + (Math.random() - 0.5) * zone.w * 0.7,
            z: zone.z + (Math.random() - 0.5) * zone.d * 0.4 + 1.5,
          };
        }
      }
      ch.group.position.y = 0.15 + Math.sin(t * 1.5 + ch.walkPhase) * 0.02;
    }
  }

  // ── Animate Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.add(p.vel);
    p.vel.y -= 0.003; // gravity
    p.life -= p.decay;
    p.mesh.material.opacity = p.life;
    p.mesh.scale.setScalar(p.life);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }

  // ── Animate Beams ──
  for (let i = beams.length - 1; i >= 0; i--) {
    const b = beams[i];
    b.life -= dt * 0.8;
    b.line.material.opacity = b.life;
    if (b.life <= 0) {
      scene.remove(b.line);
      beams.splice(i, 1);
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

/* ── Resize ────────────────────────────────────────────────── */
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  const a = w / h;
  camera.left = -frustum * a;
  camera.right = frustum * a;
  camera.top = frustum;
  camera.bottom = -frustum;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

/* ── Start ─────────────────────────────────────────────────── */
// Spawn default characters even before reset
spawnFromTopology({ users: [] });
animate();
</script>
