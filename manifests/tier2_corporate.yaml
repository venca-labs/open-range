      - Verify access control lists on the client database quarterly
    susceptibility:
      phishing_email: 0.05
      pretexting_call: 0.1
      usb_drop: 0.02
      credential_reuse: 0.05

  - username: jpark
    security_awareness: 0.5
    daily_activities:
      - Execute trade orders through the web portal
      - Send trade confirmation emails to clients
      - Pull daily portfolio performance from the database
      - Upload settlement reconciliation spreadsheets to the file share
      - Check email frequently for order amendments
    susceptibility:
      phishing_email: 0.45
      pretexting_call: 0.35
      usb_drop: 0.2
      credential_reuse: 0.4

  - username: lreeves
    security_awareness: 0.25
    daily_activities:
