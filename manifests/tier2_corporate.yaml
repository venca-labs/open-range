# Tier 2 — Corporate Range: Pinnacle Financial Group
# 10 hosts across 6 zones.  Adds a jumpbox in the DMZ and a VPN gateway at
# the perimeter, plus guest and VPN network segments.  ~15 golden-path steps.
#
# Pinnacle Financial Group is a mid-size financial advisory firm (150 employees)
# managing investment portfolios, retirement planning, and wealth management.
# SOX and PCI-DSS compliance requirements.  Handles PII, financial records,
# and SEC-regulated communications.

name: tier2_corporate
tier: 2

# ---------------------------------------------------------------------------
# Company context
# ---------------------------------------------------------------------------

company:
  name: Pinnacle Financial Group
  domain: pinnaclefg.local
  industry: financial_services
  description: >-
    Mid-size financial advisory firm with 150 employees across three offices.
    Manages $2.4B in client assets across investment portfolios, retirement
    planning, and wealth management.  Subject to SOX and PCI-DSS compliance,
    with SEC-regulated communications retention requirements.  Underwent a
    CRM platform migration 18 months ago; the legacy portal is still running
    "temporarily" alongside the new system.

departments:
  - name: Wealth Management
    description: >-
      Portfolio managers and financial advisors who manage client relationships
      and investment strategies.  Primary users of the client portal and
      trading platform.
    hosts_accessed: [web, db, mail, files]

  - name: Compliance & Risk
    description: >-
      Ensures adherence to SOX, PCI-DSS, and SEC regulations.  Reviews trade
      confirmations, audits access logs, and files quarterly SEC reports.
    hosts_accessed: [web, db, files, siem, mail]

  - name: Trading Operations
    description: >-
      Executes trades, manages order flow, and reconciles settlement records.
      High-frequency access to the client database and email confirmations.
    hosts_accessed: [web, db, mail]

  - name: Marketing & Client Relations
    description: >-
      Manages client communications, event planning, newsletters, and the
      public-facing website.  Limited access to client PII.
    hosts_accessed: [web, mail, files]

  - name: Information Technology
    description: >-
      Manages all infrastructure, user provisioning, firewall rules, VPN
      access, and SIEM monitoring.  Two-person team stretched thin after
      a recent departure.
    hosts_accessed: [web, mail, jumpbox, db, files, ldap, siem, firewall, vpn_gw]

  - name: Human Resources
    description: >-
      Handles employee records, onboarding, benefits administration, and
      payroll coordination with the external payroll provider.
    hosts_accessed: [mail, files, ldap]

