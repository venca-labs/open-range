# ---------------------------------------------------------------------------
# Data inventory — what the Builder must protect (and Red must steal)
# ---------------------------------------------------------------------------

data_inventory:
  - name: Customer PII database
    classification: restricted
    host: db
    location: "mysql:novastar_app.customers"
    description: >-
      Customer records including names, emails, phone numbers, shipping
      addresses, and hashed passwords.  Regulated under SOC 2 and GDPR.

  - name: Source code repositories
    classification: confidential
    host: devtools
    location: /srv/gitea/repositories
    description: >-
      Proprietary SaaS platform source code, including backend API, frontend
      React app, microservice configs, and infrastructure-as-code templates.

  - name: API keys and service secrets
    classification: restricted
    host: files
    location: /srv/shares/engineering/secrets
    description: >-
      Stripe payment API keys, AWS access keys for S3 uploads, SendGrid
      email API tokens, and third-party integration credentials stored in
      dotenv files and YAML configs.

  - name: CI/CD deploy tokens
    classification: confidential
    host: ci_cd
    location: /var/lib/jenkins/credentials.xml
    description: >-
      Jenkins credential store containing deploy tokens for production
      servers, Docker registry credentials, and Gitea webhook secrets.

  - name: Partner TLS certificates
    classification: confidential
    host: partner_portal
    location: /etc/nginx/partner-certs
    description: >-
      Mutual TLS client certificates and private keys used by B2B partners
      to authenticate against the partner API.

  - name: Supply chain order data
    classification: confidential
    host: db
    location: "mysql:novastar_app.orders"
    description: >-
      Customer purchase orders, supplier shipment records, inventory levels,
      and pricing data.  Contains commercially sensitive partner terms.

  - name: Database backups
    classification: restricted
    host: backup
    location: /srv/backups/mysql
    description: >-
      Nightly mysqldump archives of the full novastar_app database.  Contains
      all customer PII and order data in cleartext SQL.

  - name: SIEM event logs
    classification: internal
    host: siem
    location: "elasticsearch:novastar-logs-*"
    description: >-
      Aggregated logs from all hosts including web access logs, auth events,
      database queries, and firewall drops.  Used for incident investigation.

  - name: LDAP directory
    classification: confidential
    host: ldap
    location: "ldap:dc=novastar,dc=local"
    description: >-
      Corporate directory with all employee accounts, group memberships,
      email addresses, and organizational hierarchy.

  - name: Partner API session cache
    classification: internal
    host: cache
    location: "redis:partner_sessions"
    description: >-
      Ephemeral Redis cache holding partner API session tokens, rate limit
      counters, and cached query results for the B2B API.

# ---------------------------------------------------------------------------
# Business processes — cross-service data flows the Builder keeps realistic
# ---------------------------------------------------------------------------

business_processes:
  - name: Code commit to production deploy
    description: >-
      A developer pushes code to Gitea, which triggers a Jenkins pipeline.
      Jenkins builds, runs tests, and deploys the artifact to the web server.
      Deploy tokens authenticate Jenkins to the web host.
    data_flow:
      - "devtools:gitea"
      - "ci_cd:jenkins"
      - "ci_cd:docker"
      - "web:nginx"

  - name: Customer signup and onboarding
    description: >-
      A new customer registers through the web portal.  The app writes their
      PII to the MySQL database, creates a session in Redis, and sends a
      welcome email via the mail server.
    data_flow:
      - "web:nginx"
      - "web:php-fpm"
      - "db:mysql"
      - "cache:redis"
      - "mail:postfix"

  - name: Partner B2B API request
    description: >-
      A partner authenticates to the partner portal using mutual TLS.  The
      portal checks the session cache, queries the order database, and
      returns supply chain data.
    data_flow:
      - "partner_portal:nginx"
      - "partner_portal:python3"
      - "cache:redis"
      - "db:mysql"

  - name: Incident detection and alerting
    description: >-
      Hosts forward logs to the SIEM via rsyslog.  Elasticsearch indexes
      the events, Kibana dashboards surface anomalies, and Alertmanager on
      the monitoring host fires notifications to the security team.
    data_flow:
      - "web:rsyslog"
      - "mail:rsyslog"
      - "db:rsyslog"
      - "siem:elasticsearch"
      - "siem:kibana"
      - "monitoring:alertmanager"

  - name: Nightly database backup
    description: >-
      A cron job on the backup host connects to the database via SSH tunnel,
      runs mysqldump, compresses the archive, and stores it on local disk.
      Rsync mirrors the backup to the file server for redundancy.
    data_flow:
      - "backup:cron"
      - "db:mysql"
      - "backup:rsync"
      - "files:nfs"

  - name: Employee authentication
    description: >-
      All user logins (web portal, SSH, mail, VPN) authenticate against the
      central LDAP directory.  Kerberos provides single-sign-on for internal
      services.  Failed auth events are forwarded to the SIEM.
    data_flow:
      - "ldap:openldap"
      - "ldap:kerberos"
      - "siem:rsyslog"

# ---------------------------------------------------------------------------
# Technology stack — what software runs on this range and where the debt lives
# ---------------------------------------------------------------------------

tech_stack:
  backend:
    - name: Django
      version: "3.2"
      note: >-
        Main customer portal.  LTS ended Dec 2023 — no longer receiving
        security patches.  Django admin panel exposed at /admin with the
        default URL (no path change).
      hosts: [web]
    - name: Python
      version: "3.9"
      hosts: [web, partner_portal, ci_cd]
    - name: Node.js
      version: "18"
      note: Partner API v1 gateway.  No rate limiting on v1 endpoints.
      hosts: [partner_portal, web]

  frontend:
    - name: React
      version: "17"
      hosts: [web]

  databases:
    - name: PostgreSQL
      version: "15"
      hosts: [db]
    - name: Redis
      version: "7"
      note: >-
        Used for session cache and partner API sessions.  No authentication
        configured — relies on trusted-network assumption.
      hosts: [cache, db]
    - name: Memcached
      note: No authentication.  Used for query result caching.
      hosts: [cache]

  ci_cd:
    - name: Jenkins
      version: "2.401"
      note: >-
        Several plugin CVEs unpatched.  Deploy keys have write access to
        ALL repos (should be scoped per-repo).  Pipeline has deploy keys
        with write access to all repos.
      hosts: [ci_cd]
    - name: Gitea
      version: "1.19"
      note: >-
        Self-hosted (migrated from GitHub 4 months ago — some CI/CD
        configs still reference github.com).  Webhooks use a shared
        secret across all repos.
      hosts: [devtools]

  identity:
    - name: OpenLDAP
      version: "2.5"
      hosts: [ldap]
    - name: Kerberos
      hosts: [ldap]

  email:
    - name: Postfix
      version: "3.8"
      note: DKIM + DMARC enforced.
      hosts: [mail]
    - name: Dovecot
      note: DKIM + DMARC enforced.
      hosts: [mail]

  monitoring:
    - name: Prometheus
      hosts: [monitoring]
    - name: Grafana
      note: >-
        Dashboard accessible without authentication on the internal
        network.
      hosts: [monitoring]
    - name: Alertmanager
      hosts: [monitoring]
    - name: rsyslog
      hosts: [web, mail, db, files, jumpbox, ci_cd, devtools, ldap, siem]
    - name: Elasticsearch
      version: "8"
      hosts: [siem]

  known_debt:
    - Django admin panel exposed on /admin with default URL
    - CI/CD pipeline has deploy keys with write access to all repos
    - Partner API v1 has no rate limiting
    - Internal microservice communication uses HTTP not HTTPS
    - Gitea webhooks use shared secret across all repos
    - Database migration scripts contain seed data with real-looking test credentials
    - Grafana dashboard accessible without auth on internal network

# ---------------------------------------------------------------------------
# Credential policy — rules on paper vs enforcement in practice
# ---------------------------------------------------------------------------

credential_policy:
  policy:
    min_length: 14
    complexity: true
    no_dictionary_words: true
    rotation_days: 90
    mfa_required: true
    security_training: mandatory to retain access

  enforcement_gaps:
    - CI/CD service accounts bypass rotation (too risky to change mid-sprint)
    - Deploy tokens never expire
    - Developers use personal GitHub tokens stored in .env files
    - Partner API keys issued once and never rotated
    - Redis has no authentication (trusted network assumption)
    - Memcached has no authentication

  mfa_coverage:
    enabled:
      - all employee accounts via LDAP + TOTP
    not_enabled:
      - service accounts
      - API keys
      - deploy tokens
      - database connections

  shared_accounts:
    - account: deploy
      system: ci_cd
      shared_by: all SREs
      note: >-
        Single "deploy" user on CI/CD used by all SREs.
    - account: partner_admin
      system: partner_portal
      shared_by: [sales engineering, partner support]
      note: >-
        Shared between sales engineering and partner support teams.

  service_accounts:
    - name: svc_deploy
      access: can write to production servers
    - name: svc_monitor
      access: read access to all databases for health checks
    - name: svc_backup
      access: root-equivalent on backup server
    - name: svc_partner
      access: API account with access to all partner data

# ---------------------------------------------------------------------------
# Monitoring coverage — what is watched, what is blind
# ---------------------------------------------------------------------------

monitoring_coverage:
  logged:
    - nginx access and error logs
    - Django request log (with user and endpoint)
    - PostgreSQL query log (slow queries >500ms)
    - SSH auth on all hosts
    - Jenkins build and deploy audit log
    - Gitea repo access log
    - LDAP authentication events
    - Prometheus metrics
    - Alertmanager notifications
    - Partner API access log with client ID

  blind_spots:
    - Redis and Memcached operations completely invisible
    - Internal HTTP traffic between microservices not logged
    - DNS queries not captured
    - Container-to-container network traffic not inspected
    - Gitea webhook payloads not logged (only delivery status)
    - Backup server access not monitored (no syslog forwarding)
    - Developer workstation activity not visible

  alert_rules:
    - "Failed SSH >3/min"
    - "Deployment to production outside business hours"
    - "New SSH key added to any server"
    - "Database schema change detected"
    - "Partner API error rate >5%"
    - "Grafana/Jenkins login from new IP"
    - "Disk usage >90% on any host"
    - "Certificate expiry within 30 days"

  retention:
    standard_days: 180
    partner_api_days: 365
    partner_api_note: contractual requirement

