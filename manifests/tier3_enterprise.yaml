# Tier 3 — Enterprise Range
# NovaStar Technologies: a 500-employee software company building a SaaS platform
# for supply chain management.  16 hosts across 8 zones.  Handles customer PII,
# proprietary source code, API keys, and partner integration secrets.  Vuln chains
# that span multiple hosts and zones are expected at this tier.  ~25 golden-path steps.

name: tier3_enterprise
tier: 3

# ---------------------------------------------------------------------------
# Company narrative
# ---------------------------------------------------------------------------

company:
  name: NovaStar Technologies
  domain: novastar.local
  industry: software / SaaS
  description: >-
    NovaStar Technologies builds a SaaS platform for supply chain management
    used by mid-market manufacturers and logistics companies.  The platform
    includes a customer-facing portal, internal development tools, CI/CD
    pipelines, and a partner B2B API.  The company handles customer PII,
    proprietary source code, API keys, and partner integration secrets across
    roughly 500 employees.

# ---------------------------------------------------------------------------
# Departments
# ---------------------------------------------------------------------------

departments:
  - name: Engineering
    description: >-
      Full-stack and backend developers who build and maintain the SaaS
      platform.  Own the codebase, CI/CD pipelines, and staging environments.
    hosts_accessed: [web, db, ci_cd, devtools, cache, jumpbox]

  - name: Site Reliability
    description: >-
      SRE team responsible for production uptime, monitoring, backups, and
      incident response.  Has broad infrastructure access.
    hosts_accessed: [web, db, files, cache, backup, ci_cd, monitoring, siem, jumpbox, firewall]

  - name: Quality Assurance
    description: >-
      QA engineers who run integration and regression tests against staging
      environments.  Read access to source repos and test databases.
    hosts_accessed: [web, db, devtools, ci_cd]

  - name: Product Management
    description: >-
      Product managers who review feature specs, customer feedback dashboards,
      and release notes.  Limited technical access.
    hosts_accessed: [web, mail, devtools]

  - name: Sales Engineering
    description: >-
      Pre-sales engineers who demo the platform to prospects and configure
      partner integrations.  Access the partner portal and customer data for
      proof-of-concept work.
    hosts_accessed: [web, partner_portal, mail, files]

  - name: Information Security
    description: >-
      Security team led by the CISO.  Monitors SIEM alerts, runs vulnerability
      scans, manages firewall rules, and handles incident response.
    hosts_accessed: [siem, monitoring, firewall, ldap, jumpbox, web, mail]

  - name: IT / Helpdesk
    description: >-
      Helpdesk staff who manage user accounts, reset passwords, provision
      laptops, and handle LDAP administration.
    hosts_accessed: [ldap, mail, files, jumpbox]

