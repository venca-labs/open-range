[global]
   workgroup = MERIDIAN
   server string = Meridian Health File Server
   security = user
   map to guest = Bad User
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d
   server role = standalone server
   obey pam restrictions = yes
   unix password sync = yes
   passwd program = /usr/bin/passwd %u
   passwd chat = *Enter\snew\s*\spassword:* %n\n *Retype\snew\s*\spassword:* %n\n *password\supdated\ssuccessfully* .
   pam password change = yes

[contracts]
   comment = Insurance Contracts and Fee Schedules
   path = /srv/shares/contracts
   browseable = yes
   read only = no
   valid users = @staff

[hr]
   comment = HR and Personnel Files
   path = /srv/shares/hr
   browseable = yes
   read only = no
   valid users = @hr @it

[compliance]
   comment = HIPAA Compliance Reports
   path = /srv/shares/compliance
   browseable = yes
   read only = no
   valid users = @compliance @it

[general]
   comment = General Templates and Forms
   path = /srv/shares/general
   browseable = yes
   read only = no
   guest ok = no
   valid users = @staff
